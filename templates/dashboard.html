{% extends "base.html" %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}

<h2 class="page-title">Dashboard</h2>

<div class="row mt-4">

<div class="col-md-4">
<div class="card card-stat">

<div class="stat-icon text-primary">
<i class="fa-solid fa-magnifying-glass-chart"></i>
</div>

<div class="stat-title">Total Prediksi</div>

<div class="stat-number">
{{ total_prediksi }}
</div>

</div>
</div>

<div class="col-md-4">
<div class="card card-stat">

<div class="stat-icon text-success">
<i class="fa-solid fa-virus"></i>
</div>

<div class="stat-title">Jumlah Tanaman Tidak Sehat</div>

<div class="stat-number">
{{ total_tidak_sehat }}
</div>

</div>
</div>

<div class="col-md-4">
<div class="card card-stat">

<div class="stat-icon text-warning">
<i class="fa-solid fa-bullseye"></i>
</div>

<div class="stat-title">Rata-rata Confidence</div>

<div class="stat-number">
{{ (avg_confidence * 100) | round(2) }} %
</div>

</div>
</div>

<div class="card shadow-sm border-0 rounded-4 p-4 mt-4">
    
    <h5 class="mb-3">
        📊 Distribusi Diagnosis
    </h5>

    <canvas id="diagnosisChart" height="300"></canvas>

</div>

<script>

const ctx = document.getElementById('diagnosisChart').getContext('2d');

// gradient warna hijau
const gradient = ctx.createLinearGradient(0,0,0,400);
gradient.addColorStop(0,"rgba(34,197,94,0.8)");
gradient.addColorStop(1,"rgba(134,239,172,0.3)");

new Chart(ctx,{
type:'bar',
data:{
labels:[
{% for label in labels %}
"{{label}}",
{% endfor %}
],

datasets:[{
label:'Jumlah Kasus',
data:[
{% for value in values %}
{{value}},
{% endfor %}
],
backgroundColor:gradient,
borderRadius:10,
borderSkipped:false
}]
},

options:{

responsive:true,

animation:{
duration:1800,
easing:'easeOutQuart'
},

plugins:{
legend:{
display:false
},

tooltip:{
backgroundColor:"#1f2937",
titleColor:"#fff",
bodyColor:"#fff",
padding:12,
cornerRadius:8
}
},

scales:{

x:{
grid:{
display:false
},
ticks:{
color:"#374151",
font:{
size:13
}
}
},

y:{
beginAtZero:true,
grid:{
color:"rgba(0,0,0,0.05)"
},
ticks:{
stepSize:1
}
}

},

hover:{
mode:'nearest',
intersect:true
}

}

});

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% endblock %}
