<!DOCTYPE html>
<html>
<head>

<title>Lupa Password - Anggora PlatyScan-AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: url("{{ url_for('static', filename='images/cover.png') }}") no-repeat center center;
background-size: cover;
font-family: 'Segoe UI', sans-serif;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.4);
z-index:0;
}

.login-card{
position:relative;
z-index:1;
width:380px;
padding:35px;
border-radius:15px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-title{
font-weight:600;
text-align:center;
margin-bottom:10px;
}

.login-subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:20px;
}

.logo{
display:block;
margin:auto;
margin-bottom:15px;
width:90px;
}

.btn-login{
background:#4edf61;
border:none;
}

.btn-login:hover{
background:#1fe94b;
}

.back-link{
text-decoration:none;
font-size:14px;
color:#666;
}

.back-link:hover{
color:#000;
}

</style>

</head>

<body>

<div class="login-card">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

<h3 class="login-title">Lupa Password</h3>
<p class="login-subtitle">Masukkan email untuk reset password</p>

<form method="POST" action="/forgot">

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<button class="btn btn-login w-100 text-white">
Kirim Link Reset
</button>

<div class="text-center mt-3">
<a href="/" class="back-link">← Kembali ke Login</a>
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        <div class="alert alert-danger text-center">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% endwith %}

</form>

</div>

</body>
</html>
