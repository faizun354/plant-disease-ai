<!DOCTYPE html>
<html>
<head>

<title>Email Terkirim - Anggora PlatyScan-AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: url("{{ url_for('static', filename='images/cover.png') }}") no-repeat center center;
background-size: cover;
font-family: 'Segoe UI', sans-serif;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.4);
z-index:0;
}

.login-card{
position:relative;
z-index:1;
width:400px;
padding:35px;
border-radius:15px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.logo{
width:90px;
margin-bottom:15px;
}

.title{
font-weight:600;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:20px;
}

.btn-back{
background:#4edf61;
border:none;
color:white;
}

.btn-back:hover{
background:#1fe94b;
}

</style>

</head>

<body>

<div class="login-card">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

<h3 class="title">Cek Email Anda 📩</h3>

<p class="subtitle">
Link reset password telah dikirim ke:<br>
<b>{{ email }}</b>
</p>

<p style="font-size:13px; color:#888;">
Silakan cek inbox atau folder spam.<br>
Link berlaku selama 15 menit.
</p>

<a href="/" class="btn btn-back w-100 mt-3">
Kembali ke Login
</a>

</div>

</body>
</html>
