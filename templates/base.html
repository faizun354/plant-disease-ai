<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* GLOBAL */

body{
background:#f3f8f4;
font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */

.sidebar{
height:100vh;
width:240px;
position:fixed;
background:linear-gradient(180deg,#2ecc71,#27ae60);
color:white;
padding-top:30px;
box-shadow:3px 0 15px rgba(0,0,0,0.1);
}

.sidebar h4{
font-weight:600;
margin-bottom:30px;
letter-spacing:1px;
}

/* MENU */

.sidebar a{
color:white;
display:block;
padding:12px 25px;
text-decoration:none;
font-size:15px;
border-radius:8px;
margin:4px 12px;
transition:0.25s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
padding-left:30px;
transform:translateX(3px);
}

/* MAIN CONTENT */

.main{
margin-left:240px;
padding:35px;
}

/* PAGE TITLE */

.page-title{
font-weight:600;
color:#2c3e50;
margin-bottom:20px;
}

/* CARD */

.card{
border:none;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* DASHBOARD STAT CARD */

.card-stat{
border:none;
border-radius:15px;
padding:20px;
background:white;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.card-stat:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

/* STAT ICON */

.stat-icon{
font-size:28px;
margin-bottom:10px;
color:#27ae60;
}

/* STAT NUMBER */

.stat-number{
font-size:30px;
font-weight:600;
color:#2c3e50;
}

/* STAT TITLE */

.stat-title{
color:#6b7280;
}

/* TABLE */

.table{
border-radius:10px;
overflow:hidden;
}

.table thead{
background:#27ae60;
color:white;
}

/* BUTTON */

.btn-success{
background:#27ae60;
border:none;
}

.btn-success:hover{
background:#219150;
}

/* IMAGE */

.img-thumbnail{
border-radius:10px;
transition:0.25s;
}

.img-thumbnail:hover{
transform:scale(1.05);
}

/* RESULT BOX */

.result-box{
background:white;
border-radius:15px;
padding:25px;
margin-top:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.logout-btn{
color:#ffdddd;
}

.logout-btn:hover{
background:#e74c3c !important;
color:white !important;
}
</style>

{% block extra_head %}{% endblock %}

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4 class="text-center">
🌿 Platycerium AI
</h4>

<a href="/dashboard">
<i class="fa-solid fa-chart-line me-2"></i> Dashboard
</a>

<a href="/prediksi">
<i class="fa-solid fa-leaf me-2"></i> Prediksi
</a>

<a href="/history">
<i class="fa-solid fa-clock-rotate-left me-2"></i> History
</a>

<a href="/help">
<i class="fa-solid fa-circle-question me-2"></i> Help
</a>

<a href="/jurnal">
<i class="fa-solid fa-book me-2"></i> Jurnal Pendukung
</a>
<a href="/logout" class="logout-btn">
<i class="fa-solid fa-right-from-bracket me-2"></i> Logout
</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

{% block content %}
{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
