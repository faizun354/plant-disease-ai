<!DOCTYPE html>
<html>
<head>

<title>Login - Platycerium Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#2b5876,#4e4376);
font-family: 'Segoe UI', sans-serif;
}

.login-card{
width:380px;
padding:35px;
border-radius:15px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-title{
font-weight:600;
text-align:center;
margin-bottom:25px;
}

.btn-login{
background:#4e73df;
border:none;
}

.btn-login:hover{
background:#2e59d9;
}

</style>

</head>

<body>

<div class="login-card">

<h3 class="login-title">🌿 Platycerium AI</h3>

<form method="POST" action="/login">

<div class="mb-3">

<label class="form-label">Username</label>

<input type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-login w-100 text-white">
Login
</button>

</form>

</div>

</body>
</html>
