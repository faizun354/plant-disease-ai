<!DOCTYPE html>
<html>
<head>

<title>Login - Anggora PlatyScan-AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: url("{{ url_for('static', filename='images/cover.png') }}") no-repeat center center;
background-size: cover;
font-family: 'Segoe UI', sans-serif;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.4); /* gelap transparan */
z-index:0;
}

.login-card{
position:relative;
z-index:1;
}

.login-card{
width:380px;
padding:35px;
border-radius:15px;
background:rgb(255, 255, 255);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-title{
font-weight:600;
text-align:center;
margin-bottom:10px;
}

.login-subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:20px;
}

.logo{
display:block;
margin:auto;
margin-bottom:15px;
width:90px;
}

.forgot-link{
color:#4edf61;
text-decoration:none;
font-size:14px;
}

.forgot-link:hover{
text-decoration:underline;
color:#1fe94b;
}

.btn-login{
background:#4edf61;
border:none;
}

.btn-login:hover{
background:#1fe94b;
}

</style>

</head>

<body>

<div class="login-card">

<!-- 🔥 LOGO -->
<img src="{{ url_for('static', filename='images/logo.png') }}" 
     alt="Logo"
     class="logo">

<!-- 🔥 TITLE -->
<h3 class="login-title">PlatyScan AI</h3>
<p class="login-subtitle">Sistem Prediksi Penyakit Tanaman Platycerium</p>

<form method="POST" action="/login">

<div class="mb-3">

<label class="form-label">Username</label>

<input type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-login w-100 text-white">
Login
</button>

<div class="text-center mt-2">
    <a href="/forgot" class="forgot-link">
        Lupa Password?
    </a>
</div>

</form>

</div>

</body>
</html>
